name: Dashboard-Daten aktualisieren (täglich)

# Holt täglich GSC/Bing/Clarity/PageSpeed DIREKT von den APIs, schreibt die
# Dashboard-JSONs und lädt sie per FTP direkt auf den Server. Die Historie wird
# von der Live-Seite gelesen (history.json), NICHT aus dem Repo — deshalb wird
# nichts mehr ins Git zurück-committet (verhindert tägliche Merge-Konflikte).

on:
  schedule:
    - cron: "0 5 * * *"   # täglich 05:00 UTC (~07:00 Berlin)
  workflow_dispatch: {}     # zusätzlich manuell auslösbar (Actions-Tab → Run workflow)

permissions:
  contents: read            # kein Zurück-Committen mehr nötig

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Dashboard-Daten generieren
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          CLARITY_API_TOKEN: ${{ secrets.CLARITY_API_TOKEN }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: node scripts/build-dashboard-data.js

      - name: Auf Server hochladen (FTP)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; set ftp:ssl-protect-data yes; \
            mkdir -p /www/copilotenschule.de/dashboard/; \
            cd /www/copilotenschule.de/dashboard/; \
            put public/dashboard/data.json -o data.json; \
            put public/dashboard/history.json -o history.json; \
            quit" \
            -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}
