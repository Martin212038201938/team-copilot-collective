name: Deploy to copilotenschule.de
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Clean build artifacts
        run: |
          echo "Cleaning all build artifacts..."
          rm -rf dist
          rm -rf node_modules/.vite
          rm -rf node_modules/.cache
          echo "Build artifacts cleaned successfully"

      - name: Install dependencies
        run: npm install

      - name: Verify Chrome
        run: |
          google-chrome-stable --version
          which google-chrome-stable

      - name: Validate SEO + generate sitemap (prebuild)
        run: npm run prebuild

      - name: Vite Build
        run: npx vite build
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Copy API files
        run: npm run copy-api

      - name: React-Snap pre-render
        run: npm run snap
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
          CI: true
      
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via LFTP
        run: |
          lftp -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; set ftp:ssl-protect-data yes; mirror -R --delete dist/ /www/copilotenschule.de/ ; quit" -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}


      - name: Notify Bing IndexNow about updated pages
        run: |
          echo "Starting IndexNow notification..."
          SITEMAP_URL="https://copilotenschule.de/sitemap.xml"
          # Key MUST match a *.txt file in /public/ — see public/02184b6b954d4a158c75668dbf809161.txt
          INDEXNOW_KEY="02184b6b954d4a158c75668dbf809161"
          sleep 10
          echo "Fetching sitemap from $SITEMAP_URL"
          URLS=$(curl -s "$SITEMAP_URL" | grep -oP '(?<=<loc>)[^<]+' | head -100)
          URL_COUNT=$(echo "$URLS" | wc -l)
          echo "Found $URL_COUNT URLs in sitemap"
          SUCCESS_COUNT=0
          for URL in $URLS; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://api.indexnow.org/indexnow?url=$URL&key=$INDEXNOW_KEY")
            if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            fi
          done
          echo "IndexNow completed: $SUCCESS_COUNT/$URL_COUNT URLs submitted"
